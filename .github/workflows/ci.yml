name: CI/CD
on:
  push:
    branches: [master]
  pull_request:
    branches: [master]
jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.5"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: go build -o azure-server .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.21.5"

      - name: Build Go application
        run: go build -o azure-server .

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.VM_HOST }} >> ~/.ssh/known_hosts 2>/dev/null

      - name: Copy files to Azure VM
        run: |
          scp -r -o StrictHostKeyChecking=no ./* ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/azureuser/

      - name: Deploy to Azure VM
        run: |
          ssh ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }} bash << 'EOF'
            pkill -f "azure-server" || true
            fuser -k 8080/tcp || true
            sleep 2
            chmod +x /home/azureuser/azure-server
            nohup /home/azureuser/azure-server > /home/azureuser/server.log 2>&1 &
            disown
          EOF
