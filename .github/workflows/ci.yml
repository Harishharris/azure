name: CI/CD

on:
  push:
    branches: [master]
  pull_request:
    branches: [master]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Download dependencies
        run: go mod download

      - name: Run tests
        run: go test -v ./...

      - name: Build
        run: go build -o azure-server .

  deploy:
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && github.ref == 'refs/heads/master'

    steps:
      - uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.5"

      - name: Build Go application
        run: go build -o azure-server .

      - name: Deploy to Azure VM via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: 22
          script: |
            # Copy files from GitHub workspace to VM using scp
            scp -r -o StrictHostKeyChecking=no ${{ github.workspace }}/* ${{ secrets.VM_USER }}@${{ secrets.VM_HOST }}:/home/azureuser/

            # Navigate to the azureuser home directory
            cd /home/azureuser

            # Check if server is already running and stop it
            if pgrep -f "go run server.go" > /dev/null; then
                echo "Stopping existing server..."
                pkill -f "go run server.go"
                sleep 2
            fi

            # Ensure Go is installed (install if not present)
            if ! command -v go &> /dev/null; then
                echo "Installing Go..."
                wget -q https://go.dev/dl/go1.25.5.linux-amd64.tar.gz
                sudo rm -rf /usr/local/go && sudo tar -C /usr/local -xzf go1.25.5.linux-amd64.tar.gz
                export PATH=$PATH:/usr/local/go/bin
                echo 'export PATH=$PATH:/usr/local/go/bin' >> ~/.bashrc
                rm go1.25.5.linux-amd64.tar.gz
            fi

            # Download dependencies
            go mod download

            # Run the server in background
            nohup go run server.go > server.log 2>&1 &

            # Wait a moment and check if it's running
            sleep 3
            if pgrep -f "go run server.go" > /dev/null; then
                echo "Server started successfully!"
                echo "Process ID: $(pgrep -f "go run server.go")"
            else
                echo "Server failed to start. Check server.log for details."
                cat server.log
            fi
